<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="src/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="bg-[#FDDECE]">
      <header
        class="max-w-300 m-auto flex justify-between items-center p-[20px_15px] lg:p-[20px_0]"
      >
        <div class="flex gap-[50px] items-center">
          <img src="./src/Abdullo/logo.png" alt="" />
          <nav class="flex items-center gap-[20px] hidden lg:flex">
            <p class="text-[#424551] font-bold">About Us</p>
            <p class="text-[#424551] font-bold">Courses</p>
            <p class="text-[#424551] font-bold">Events</p>
            <p class="text-[#424551] font-bold">Blog</p>
            <p class="text-[#424551] font-bold">Contacts</p>
          </nav>
        </div>
        <div class="flex gap-[20px] items-center">
          <button
            class="hidden lg:flex font-bold text-white bg-[#FD472C] p-[10px_30px] rounded-[5px] text-[12px]"
          >
            Get consultation
          </button>
          <div class="flex gap-[6px] items-center">
            <i class="fa-regular fa-user text-[#424551]"></i>
            <p class="text-[#424551] font-bold">Log in / Register</p>
          </div>
        </div>
      </header>
    </div>
  </body>
</html>
